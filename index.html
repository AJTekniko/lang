<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="stylesheet" href="./style.css"><title>Aprenda Ku'ahl</title></head><body><div class="container"><div class="header"><h1>Aprenda Ku'ahl</h1><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div><div id="progressText" style="color: #666; font-size: 14px;"></div></div><div id="quizContainer"><div class="question-section"><span class="question-type" id="questionType"></span><div class="question-text" id="questionText"></div><button class="audio-button" id="audioButton" style="display: none;"><span>🔊</span><span>Escuchar</span></button></div><div id="optionsContainer" class="options" style="display: none;"></div><div class="input-section" id="inputSection" style="display: none;"><input type="text" id="answerInput" placeholder="Escriba su respuesta..." autocomplete="off" ></div><div class="feedback" id="feedback"></div><div class="button-group"><button class="btn btn-primary" id="submitBtn" disabled>Check</button><button class="btn btn-secondary" id="skipBtn">Pasar</button></div></div><div class="completion-screen" id="completionScreen"><h2 id="completionTitle">¡Examen Terminado! 🎉</h2><div class="completion-message" id="completionMessage"></div><div class="score" id="finalScore"></div><div class="stats"><div class="stat-item"><span>Preguntas Contestadas:</span><span id="totalQuestions">0</span></div><div class="stat-item"><span>Respuestas Correctas:</span><span id="correctAnswers">0</span></div><div class="stat-item"><span>Precisión:</span><span id="accuracy">0%</span></div></div><button class="btn btn-primary" onclick="location.reload()" style="width: 100%;">Comenzar De Nuevo</button></div></div><script src="script.js"></script></body></html>
