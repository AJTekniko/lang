<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spanish Learning App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-section {
            margin-bottom: 30px;
        }

        .question-type {
            display: inline-block;
            background: #f0f0f0;
            color: #666;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 20px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .audio-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.3s ease;
        }

        .audio-button:hover {
            background: #764ba2;
        }

        .audio-button span {
            font-size: 18px;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
            color: #333;
        }

        .option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .option.correct {
            border-color: #4caf50;
            background: #4caf50;
            color: white;
        }

        .option.incorrect {
            border-color: #f44336;
            background: #f44336;
            color: white;
        }

        .input-section {
            margin-bottom: 20px;
        }

        .input-section input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .input-section input:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-section input:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }

        .input-section input.correct {
            border-color: #4caf50;
            background: #f1f8f5;
        }

        .input-section input.incorrect {
            border-color: #f44336;
            background: #fdf1f1;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #764ba2;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .feedback {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }

        .feedback.incorrect {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }

        .completion-screen {
            display: none;
            text-align: center;
        }

        .completion-screen.show {
            display: block;
        }

        .completion-screen h2 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .completion-screen .score {
            font-size: 48px;
            color: #4caf50;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .completion-screen p {
            color: #666;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .stats {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .stat-item:last-child {
            margin-bottom: 0;
        }

        .translation {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 14px;
            color: #666;
            display: none;
        }

        .translation.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Learn Spanish</h1>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div id="progressText" style="color: #666; font-size: 14px;"></div>
        </div>

        <div id="quizContainer">
            <div class="question-section">
                <span class="question-type" id="questionType"></span>
                <div class="question-text" id="questionText"></div>
                <button class="audio-button" id="audioButton" style="display: none;">
                    <span>🔊</span>
                    <span>Listen</span>
                </button>
            </div>

            <div id="optionsContainer" class="options" style="display: none;"></div>

            <div class="input-section" id="inputSection" style="display: none;">
                <input 
                    type="text" 
                    id="answerInput" 
                    placeholder="Type your answer..."
                    autocomplete="off"
                >
                <div class="translation" id="translation"></div>
            </div>

            <div class="feedback" id="feedback"></div>

            <div class="button-group">
                <button class="btn btn-primary" id="submitBtn" disabled>Check</button>
                <button class="btn btn-secondary" id="skipBtn">Skip</button>
            </div>
        </div>

        <div class="completion-screen" id="completionScreen">
            <h2>Lesson Complete! 🎉</h2>
            <div class="score" id="finalScore"></div>
            <div class="stats">
                <div class="stat-item">
                    <span>Questions Answered:</span>
                    <span id="totalQuestions">0</span>
                </div>
                <div class="stat-item">
                    <span>Correct Answers:</span>
                    <span id="correctAnswers">0</span>
                </div>
                <div class="stat-item">
                    <span>Accuracy:</span>
                    <span id="accuracy">0%</span>
                </div>
            </div>
            <button class="btn btn-primary" onclick="location.reload()" style="width: 100%;">Start Again</button>
        </div>
    </div>

    <script>
        const lessonsData = [
            {
                type: 'multiple-choice',
                question: 'What does "Hola" mean in Spanish?',
                spanish: 'Hola',
                options: ['Hello', 'Goodbye', 'Good morning', 'Good night'],
                correct: 0,
                translation: 'Hola means hello'
            },
            {
                type: 'multiple-choice',
                question: 'What does "Agua" mean in Spanish?',
                spanish: 'Agua',
                options: ['Water', 'Bread', 'Milk', 'Juice'],
                correct: 0,
                translation: 'Agua means water'
            },
            {
                type: 'typing',
                question: 'How do you say "Good morning" in Spanish?',
                spanish: 'Buenos días',
                correct: 'buenos días',
                translation: 'Buenos días means good morning'
            },
            {
                type: 'multiple-choice',
                question: 'What does "Gracias" mean in Spanish?',
                spanish: 'Gracias',
                options: ['Thank you', 'Please', "You're welcome", 'Sorry'],
                correct: 0,
                translation: 'Gracias means thank you'
            },
            {
                type: 'typing',
                question: 'How do you say "Please" in Spanish?',
                spanish: 'Por favor',
                correct: 'por favor',
                translation: 'Por favor means please'
            },
            {
                type: 'multiple-choice',
                question: 'What does "Gato" mean in Spanish?',
                spanish: 'Gato',
                options: ['Dog', 'Cat', 'Bird', 'Fish'],
                correct: 1,
                translation: 'Gato means cat'
            },
            {
                type: 'typing',
                question: 'How do you say "My name is" in Spanish?',
                spanish: 'Me llamo',
                correct: 'me llamo',
                translation: 'Me llamo means my name is'
            },
            {
                type: 'multiple-choice',
                question: 'What does "Sí" mean in Spanish?',
                spanish: 'Sí',
                options: ['No', 'Yes', 'Maybe', 'Never'],
                correct: 1,
                translation: 'Sí means yes'
            },
            {
                type: 'multiple-choice',
                question: 'What does "Hermoso" mean in Spanish?',
                spanish: 'Hermoso',
                options: ['Ugly', 'Beautiful', 'Big', 'Small'],
                correct: 1,
                translation: 'Hermoso means beautiful'
            },
            {
                type: 'typing',
                question: 'How do you say "How are you?" in Spanish?',
                spanish: '¿Cómo estás?',
                correct: 'cómo estás',
                translation: '¿Cómo estás? means how are you?'
            }
        ];

        let lessons = [];
        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        let selectedOption = null;

        function normalizeText(text) {
            return text
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[\u2018\u2019`]/g, "'");
        }

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function getAudioPath(spanish) {
            const normalized = spanish
                .toLowerCase()
                .replace(/[¿?]/g, '')
                .trim()
                .replace(/\s+/g, '_');
            return `sounds/${normalized}.ogg`;
        }

        function playSound(filename) {
            const audio = new Audio(filename);
            audio.play().catch(() => {
                console.log(`Could not play ${filename}`);
            });
        }

        function startLesson() {
            lessons = shuffleArray(lessonsData);
            displayQuestion();
        }

        function displayQuestion() {
            const question = lessons[currentQuestion];
            const progressPercent = ((currentQuestion + 1) / lessons.length) * 100;

            document.getElementById('progressFill').style.width = progressPercent + '%';
            document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} of ${lessons.length}`;

            document.getElementById('questionType').textContent = question.type === 'multiple-choice' ? 'MULTIPLE CHOICE' : 'TYPE THE ANSWER';
            document.getElementById('questionText').textContent = question.question;

            const feedback = document.getElementById('feedback');
            feedback.classList.remove('show', 'correct', 'incorrect');

            const translation = document.getElementById('translation');
            translation.classList.remove('show');

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Check';

            answered = false;
            selectedOption = null;

            if (question.type === 'multiple-choice') {
                displayMultipleChoice(question);
            } else {
                displayTypingQuestion(question);
            }
        }

        function displayMultipleChoice(question) {
            const inputSection = document.getElementById('inputSection');
            const optionsContainer = document.getElementById('optionsContainer');
            const audioButton = document.getElementById('audioButton');

            inputSection.style.display = 'none';
            optionsContainer.style.display = 'grid';
            audioButton.style.display = 'flex';

            optionsContainer.innerHTML = '';

            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.textContent = option;
                optionDiv.onclick = () => selectOption(index);
                optionsContainer.appendChild(optionDiv);
            });

            audioButton.onclick = () => {
                playSound(getAudioPath(question.spanish));
            };
        }

        function displayTypingQuestion(question) {
            const inputSection = document.getElementById('inputSection');
            const optionsContainer = document.getElementById('optionsContainer');
            const audioButton = document.getElementById('audioButton');
            const answerInput = document.getElementById('answerInput');

            inputSection.style.display = 'block';
            optionsContainer.style.display = 'none';
            audioButton.style.display = 'flex';

            answerInput.value = '';
            answerInput.disabled = false;
            answerInput.classList.remove('correct', 'incorrect');
            answerInput.focus();

            answerInput.onkeypress = (e) => {
                if (e.key === 'Enter' && !document.getElementById('submitBtn').disabled) {
                    submitAnswer();
                }
            };

            answerInput.oninput = () => {
                document.getElementById('submitBtn').disabled = answerInput.value.trim() === '';
            };

            audioButton.onclick = () => {
                playSound(getAudioPath(question.spanish));
            };
        }

        function selectOption(index) {
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = false;

            if (!answered) {
                options[index].classList.add('selected');
                selectedOption = index;
                playSound('sounds/select.ogg');
            }
        }

        function submitAnswer() {
            if (answered) {
                nextQuestion();
                return;
            }

            const question = lessons[currentQuestion];
            const feedback = document.getElementById('feedback');
            let isCorrect = false;

            if (question.type === 'multiple-choice') {
                isCorrect = selectedOption === question.correct;
                markMultipleChoice(isCorrect);
                if (isCorrect) {
                    playSound('sounds/correct.ogg');
                } else {
                    playSound('sounds/incorrect.ogg');
                }
            } else {
                const answerInput = document.getElementById('answerInput');
                const userAnswer = normalizeText(answerInput.value.trim());
                const correctAnswer = normalizeText(question.correct);
                isCorrect = userAnswer === correctAnswer;
                markTypingQuestion(isCorrect);
                if (isCorrect) {
                    playSound('sounds/correct.ogg');
                } else {
                    playSound('sounds/incorrect.ogg');
                }
            }

            if (isCorrect) {
                score++;
                feedback.textContent = '✓ Correct!';
                feedback.classList.add('show', 'correct');
            } else {
                feedback.textContent = `✗ Incorrect. The correct answer is: ${question.spanish}`;
                feedback.classList.add('show', 'incorrect');
            }

            document.getElementById('translation').textContent = question.translation;
            document.getElementById('translation').classList.add('show');

            document.getElementById('submitBtn').textContent = 'Next';
            answered = true;
        }

        function markMultipleChoice(isCorrect) {
            const options = document.querySelectorAll('.option');
            const question = lessons[currentQuestion];

            options.forEach((option, index) => {
                option.style.pointerEvents = 'none';

                if (index === question.correct) {
                    option.classList.add('correct');
                } else if (index === selectedOption && !isCorrect) {
                    option.classList.add('incorrect');
                }
            });
        }

        function markTypingQuestion(isCorrect) {
            const answerInput = document.getElementById('answerInput');
            answerInput.disabled = true;

            if (isCorrect) {
                answerInput.classList.add('correct');
            } else {
                answerInput.classList.add('incorrect');
            }
        }

        function nextQuestion() {
            currentQuestion++;

            if (currentQuestion >= lessons.length) {
                showCompletion();
            } else {
                displayQuestion();
            }
        }

        function skipQuestion() {
            nextQuestion();
        }

        function showCompletion() {
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('completionScreen').classList.add('show');

            const percentage = Math.round((score / lessons.length) * 100);
            document.getElementById('finalScore').textContent = `${percentage}%`;
            document.getElementById('totalQuestions').textContent = lessons.length;
            document.getElementById('correctAnswers').textContent = score;
            document.getElementById('accuracy').textContent = percentage + '%';
        }

        document.getElementById('submitBtn').onclick = submitAnswer;
        document.getElementById('skipBtn').onclick = skipQuestion;

        startLesson();
    </script>
</body>
</html>
